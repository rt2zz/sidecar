name: Merge sidecar inbox

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sidecar repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sidecar
        run: pipx install git+https://github.com/rt2zz/sidecar.git

      - name: Write sidecar config
        run: |
          cat > .sidecar <<'EOF'
          version = 1
          remote = "${{ github.server_url }}/${{ github.repository }}.git"
          path = "."
          branch = "main"
          inbox = "sidecar-inbox/{user}/{host}"
          EOF

      - name: Merge inbox branches
        run: sidecar merge --fork-files --delete-merged-inbox
